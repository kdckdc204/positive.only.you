<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>긍정뽑기</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="hero">
      <p class="badge">Positive Claw Machine</p>
      <h1>🎁 오늘의 긍정 뽑기</h1>
      <p class="subtitle">인형뽑기처럼 오늘 나에게 필요한 문장을 뽑아보세요.</p>

      <div class="name-box">
        <input id="nameInput" type="text" placeholder="이름 입력 ex) 동찬" maxlength="12" />
        <button id="saveNameBtn">이름 적용</button>
      </div>
      <p id="nameGuide">당신을 위한 오늘의 한마디</p>
    </section>

    <nav class="tabs" aria-label="카테고리 선택">
      <button class="tab active" data-category="all">🎲 전체</button>
      <button class="tab" data-category="self">💪 자존감</button>
      <button class="tab" data-category="courage">🔥 용기</button>
      <button class="tab" data-category="love">❤️ 사랑</button>
      <button class="tab" data-category="relation">🤝 인간관계</button>
    </nav>

    <section class="machine-wrap">
      <div class="machine">
        <div class="top-light"></div>
        <div class="glass">
          <div id="claw" class="claw">
            <div class="string"></div>
            <div class="hand">🕹️</div>
          </div>
          <div id="capsule" class="capsule">💊</div>
          <div class="balls">🟡 🟣 🔵 🟢 🩷 🟠</div>
        </div>
        <button id="drawBtn" class="draw-btn">뽑기 하기</button>
      </div>
    </section>

    <section class="result-card">
      <p id="categoryLabel" class="category-label">🎲 전체</p>
      <p id="result">버튼을 눌러 긍정 문장을 뽑아보세요.</p>
      <div class="actions">
        <button id="copyBtn">📋 복사하기</button>
        <button id="redrawBtn">🔄 다시 뽑기</button>
        <button id="shareBtn">📤 친구에게 공유</button>
        <button id="likeBtn">🤍 마음에 들어요</button>
      </div>
      <p id="likeCount">좋아요 0개</p>
    </section>

    <section class="partner-box">
      <p>🛒 오늘의 추천 상품</p>
      <a id="coupangLink" class="partner-btn" href="https://link.coupang.com/a/ex48AR81cG" target="_blank" rel="noopener">
        오늘의 추천 상품 보러가기
      </a>
      <p class="coupang-notice">
        이 포스팅은 쿠팡 파트너스 활동의 일환으로,<br>
        이에 따른 일정액의 수수료를 제공받을 수 있습니다.
      </p>
    </section>

    <footer>
      제작 : 부산 고1 김동찬<br />
      <span>본 사이트는 사람들에게 긍정의 힘을 전하기 위해 제작되었습니다.</span>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
